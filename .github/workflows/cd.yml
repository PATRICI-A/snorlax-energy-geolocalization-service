name: CD – Deploy to Azure

on:
  workflow_run:
    workflows: ["CI – Build & Test"]
    branches: [main]
    types: [completed]

env:
  JAVA_VERSION: '21'

jobs:
  deploy-to-azure:
    name: "CD – Deploy to Azure App Service"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21 with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn package -DskipTests -B

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy JAR to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          package:  target/geolocalization-service-*.jar

      - name: Show deployed URL
        run: |
          echo "Deploy exitoso"
          echo "  API:     https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net/api/v1/geo"
          echo "  Swagger: https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"
