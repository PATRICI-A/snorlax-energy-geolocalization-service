name: QA – Sonar Analysis

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - develop
      - main

env:
  JAVA_VERSION: '21'

jobs:

  sonar:
    name: "QA – Sonar Analysis"
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Sonar Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE: dev

        run: |
          mvn clean verify sonar:sonar -B \
            -Dsonar.projectKey=patrici-a_snorlax-energy-geolocalization-service \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.coverage.exclusions="**/infrastructure/external/**,**/infrastructure/config/**,**/infrastructure/adapters/**,**/application/dto/**,**/entrypoints/rest/request/**,**/entrypoints/rest/mapper/**,**/entrypoints/advice/ErrorResponse.java,**/GeolocalizationApplication.java"
